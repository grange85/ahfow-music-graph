<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Relationship Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #555;
    --link: #2e2e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-shrink: 0;
    background: var(--surface);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    color: #e8ff47;
    white-space: nowrap;
  }

  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: color 0.15s;
    user-select: none;
  }

  .legend-item:hover { color: var(--text); }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-swatch { width: 14px; height: 14px; flex-shrink: 0; }

  #status {
    margin-left: auto;
    font-size: 0.58rem;
    color: var(--muted);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .reload-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    padding: 3px 9px;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .reload-btn:hover { color: #e8ff47; border-color: #e8ff47; }

  .main { display: flex; flex: 1; overflow: hidden; }

  #graph { flex: 1; position: relative; overflow: hidden; }

  svg { width: 100%; height: 100%; }

  .link { stroke: var(--link); stroke-width: 1.5; fill: none; }
  .link.faded { opacity: 0.06; }

  .link-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    fill: #383838;
    pointer-events: none;
  }

  .link-label.faded { opacity: 0.06; }
  .link-label.highlighted { fill: #666; }

  .node { cursor: pointer; }
  .node.faded { opacity: 0.1; }

  .node text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    flex-shrink: 0;
  }

  .search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #searchInput {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 8px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: #e8ff47; }
  #searchInput::placeholder { color: var(--muted); }

  .sidebar-inner {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
  }

  .sidebar-inner h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .empty-msg { font-size: 0.62rem; color: var(--muted); line-height: 1.7; }

  .info-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.04em;
    line-height: 1.1;
    margin-bottom: 5px;
  }

  .type-badge {
    display: inline-block;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-bottom: 10px;
    color: #000;
  }

  .rel-group-title {
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 10px 0 4px;
  }

  .rel-item {
    font-size: 0.62rem;
    line-height: 1.5;
    color: var(--muted);
    border-left: 2px solid var(--border);
    padding: 2px 0 2px 8px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .rel-item:hover { border-left-color: #777; color: var(--text); }
  .rel-item .rel-target { color: var(--text); }
  .rel-item .rel-note { color: #444; font-style: italic; font-size: 0.58rem; }

  /* GRAPH CONTROLS */
  .graph-controls {
    position: absolute;
    bottom: 14px; left: 14px;
    display: flex; gap: 5px;
  }

  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }

  .ctrl-btn:hover { color: #e8ff47; border-color: #e8ff47; }

  .hint {
    position: absolute;
    bottom: 14px; right: 14px;
    font-size: 0.52rem;
    color: #282828;
    text-align: right;
    line-height: 1.8;
    pointer-events: none;
  }

  /* LOADING */
  #loadingOverlay {
    position: absolute; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    z-index: 10;
    transition: opacity 0.4s;
  }

  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: #e8ff47;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.62rem; color: var(--muted); }

  #errorMsg {
    display: none;
    position: absolute; inset: 0;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    font-size: 0.68rem; color: #ff4757;
    text-align: center; padding: 40px;
  }

  #errorMsg.show { display: flex; }
  #errorMsg code {
    background: #1a1a1a;
    padding: 8px 12px;
    border-radius: 3px;
    color: var(--muted);
    font-size: 0.62rem;
    word-break: break-all;
  }
</style>
</head>
<body>

<header>
  <h1>Music Graph</h1>
  <div id="legend"></div>
  <div id="status">
    <span id="statusText"></span>
    <button class="reload-btn" onclick="loadData()">↺ reload</button>
  </div>
</header>

<div class="main">
  <div id="graph">
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">loading relationships…</div>
    </div>
    <div id="errorMsg"></div>
    <svg id="svg"></svg>
    <div class="graph-controls">
      <button class="ctrl-btn" id="zoomIn">+</button>
      <button class="ctrl-btn" id="zoomOut">−</button>
      <button class="ctrl-btn" id="zoomReset">⟳</button>
    </div>
    <div class="hint">drag · scroll to zoom · click to inspect</div>
  </div>

  <div class="sidebar">
    <div class="search-wrap">
      <input id="searchInput" placeholder="search nodes…" autocomplete="off">
    </div>
    <div class="sidebar-inner">
      <h2>Inspector</h2>
      <div id="infoContent">
        <p class="empty-msg">Click any node to inspect its connections.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════════
// const CSV_URL = 'relationships.csv';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSKUo_yx0B-e1gQNPrPdwmkC7ykv_p5nlBfoxF_rKd71AkELMWY2V0-2mpqU8ZOPNEFbUtKUsdRPWzb/pub?gid=1748948689&single=true&output=csv';

// ═══════════════════════════════════════════════════════════════════════════════
// NODE TYPE REGISTRY
// ═══════════════════════════════════════════════════════════════════════════════
const NODE_TYPES = {
  person:   { color: '#ff4757', shape: 'circle',   size: 10, label: 'Person'        },
  band:     { color: '#e8ff47', shape: 'circle',   size: 14, label: 'Band / Group'  },
  album:    { color: '#c77dff', shape: 'diamond',  size: 11, label: 'Album'         },
  label:    { color: '#47c8ff', shape: 'square',   size: 11, label: 'Record Label'  },
  producer: { color: '#ff9f43', shape: 'triangle', size: 10, label: 'Producer'      },
  engineer: { color: '#2ed573', shape: 'triangle', size: 10, label: 'Engineer'      },
};

const AUTO_COLORS = ['#fd79a8','#fdcb6e','#6c5ce7','#00b894','#e17055','#74b9ff'];
let autoColorIdx = 0;

function getNodeType(typeName) {
  const key = (typeName || 'person').toLowerCase().trim();
  if (!NODE_TYPES[key]) {
    NODE_TYPES[key] = {
      color: AUTO_COLORS[autoColorIdx++ % AUTO_COLORS.length],
      shape: 'circle',
      size: 10,
      label: key.charAt(0).toUpperCase() + key.slice(1),
    };
  }
  return NODE_TYPES[key];
}

// ═══════════════════════════════════════════════════════════════════════════════
// CSV PARSING
// ═══════════════════════════════════════════════════════════════════════════════
function parseCSVLine(line) {
  const result = []; let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuote = !inQuote; continue; }
    if (c === ',' && !inQuote) { result.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const start = lines[0].toLowerCase().startsWith('from') ? 1 : 0;
  return lines.slice(start).map(line => {
    const c = parseCSVLine(line);
    return { from: c[0]||'', fromType: c[1]||'person', rel: c[2]||'related to', to: c[3]||'', toType: c[4]||'person', note: c[5]||'' };
  }).filter(r => r.from && r.to);
}

// ═══════════════════════════════════════════════════════════════════════════════
// GRAPH STATE
// ═══════════════════════════════════════════════════════════════════════════════
let graphNodes = [];
let graphLinks = [];
let activeFilter = null;
let selectedNode = null;

function buildGraph(rows) {
  const nodeMap = new Map(); let nextId = 1;
  function getNode(name, type) {
    const key = name.toLowerCase();
    if (!nodeMap.has(key)) nodeMap.set(key, { id: nextId++, name, type: type.toLowerCase().trim() });
    return nodeMap.get(key);
  }
  const links = rows.map(r => {
    const source = getNode(r.from, r.fromType);
    const target = getNode(r.to,   r.toType);
    return { source: source.id, target: target.id, label: r.rel, note: r.note };
  });
  return { nodes: [...nodeMap.values()], links };
}

// ═══════════════════════════════════════════════════════════════════════════════
// D3 GRAPH
// ═══════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#svg');
const gRoot = svg.append('g');

// Arrowhead marker
svg.append('defs').append('marker')
  .attr('id', 'arrow').attr('viewBox', '0 -4 8 8')
  .attr('refX', 22).attr('refY', 0)
  .attr('markerWidth', 5).attr('markerHeight', 5)
  .attr('orient', 'auto')
  .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', '#3a3a3a');

const zoom = d3.zoom().scaleExtent([0.15, 5])
  .on('zoom', e => gRoot.attr('transform', e.transform));
svg.call(zoom).on('dblclick.zoom', null);

let width = 0, height = 0, simulation = null;

function getSize() {
  const el = document.getElementById('graph');
  width = el.clientWidth; height = el.clientHeight;
}

// SVG path strings for non-circle shapes
function shapePath(type, size) {
  const s = size;
  switch(type) {
    case 'diamond':  return `M0,${-s*1.4} L${s},0 L0,${s*1.4} L${-s},0 Z`;
    case 'square':   return `M${-s},${-s} L${s},${-s} L${s},${s} L${-s},${s} Z`;
    case 'triangle': return `M0,${-s*1.3} L${s*1.1},${s*0.9} L${-s*1.1},${s*0.9} Z`;
    case 'hexagon': {
      const pts = d3.range(6).map(i => { const a = (Math.PI/3)*i - Math.PI/6; return [s*Math.cos(a), s*Math.sin(a)]; });
      return 'M' + pts.map(p => p.join(',')).join('L') + 'Z';
    }
    default: return null;
  }
}

function lighten(hex) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, ((n>>16)&0xff)+50);
  const gg = Math.min(255, ((n>>8)&0xff)+50);
  const b = Math.min(255, (n&0xff)+50);
  return `rgb(${r},${gg},${b})`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ARC HELPERS — curved paths for parallel edges
// ═══════════════════════════════════════════════════════════════════════════════
function arcPath(d) {
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const offset = d._arcOffset ?? 0;
  if (offset === 0) return `M${sx},${sy}L${tx},${ty}`;
  const mx = (sx + tx) / 2, my = (sy + ty) / 2;
  const dx = tx - sx, dy = ty - sy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const cpx = mx - (dy / len) * offset;
  const cpy = my + (dx / len) * offset;
  return `M${sx},${sy}Q${cpx},${cpy},${tx},${ty}`;
}

function arcMidpoint(d) {
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const offset = d._arcOffset ?? 0;
  const mx = (sx + tx) / 2, my = (sy + ty) / 2;
  if (offset === 0) return { x: mx, y: my };
  const dx = tx - sx, dy = ty - sy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const cpx = mx - (dy / len) * offset;
  const cpy = my + (dx / len) * offset;
  return { x: (sx/4 + cpx/2 + tx/4), y: (sy/4 + cpy/2 + ty/4) };
}

function annotateArcs(links) {
  const pairTotal = {};
  links.forEach(l => {
    const sid = l.source.id ?? l.source;
    const tid = l.target.id ?? l.target;
    const key = [Math.min(sid, tid), Math.max(sid, tid)].join('-');
    pairTotal[key] = (pairTotal[key] ?? 0) + 1;
  });
  const pairSeen = {};
  links.forEach(l => {
    const sid = l.source.id ?? l.source;
    const tid = l.target.id ?? l.target;
    const key = [Math.min(sid, tid), Math.max(sid, tid)].join('-');
    const total = pairTotal[key];
    const idx = pairSeen[key] ?? 0;
    pairSeen[key] = idx + 1;
    l._arcOffset = total === 1 ? 0 : (idx - (total - 1) / 2) * 55;
  });
}

function renderGraph() {
  getSize();
  gRoot.selectAll('*').remove();

  simulation = d3.forceSimulation()
    .force('link',      d3.forceLink().id(d => d.id).distance(150).strength(0.5))
    .force('charge',    d3.forceManyBody().strength(-380))
    .force('center',    d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide(d => getNodeType(d.type).size + 24));

  const nodeMap = new Map(graphNodes.map(n => [n.id, n]));
  const links = graphLinks.map(l => ({
    ...l,
    source: typeof l.source === 'object' ? l.source : nodeMap.get(l.source),
    target: typeof l.target === 'object' ? l.target : nodeMap.get(l.target),
  })).filter(l => l.source && l.target);

  annotateArcs(links);

  // EDGES
  const linkG = gRoot.append('g');
  const linkGroups = linkG.selectAll('g').data(links).enter().append('g');
  linkGroups.append('path').attr('class', 'link').attr('marker-end', 'url(#arrow)');
  linkGroups.append('text').attr('class', 'link-label')
    .text(d => d.label + (d.note ? ` [${d.note}]` : ''));

  // NODES
  const nodeG = gRoot.append('g');
  const nodeGroups = nodeG.selectAll('g').data(graphNodes).enter().append('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('click', (e, d) => { e.stopPropagation(); selectNode(d, links); });

  nodeGroups.each(function(d) {
    const nt = getNodeType(d.type);
    const el = d3.select(this);
    const path = shapePath(nt.shape, nt.size);
    if (path) {
      el.append('path').attr('d', path)
        .attr('fill', nt.color).attr('stroke', lighten(nt.color)).attr('stroke-width', 2);
    } else {
      el.append('circle').attr('r', nt.size)
        .attr('fill', nt.color).attr('stroke', lighten(nt.color)).attr('stroke-width', 2);
    }
    el.append('text').attr('dy', nt.size + 14).text(d.name);
  });

  simulation.nodes(graphNodes).on('tick', () => {
    linkGroups.select('path').attr('d', d => arcPath(d));
    linkGroups.select('text').each(function(d) {
      const mid = arcMidpoint(d);
      d3.select(this).attr('x', mid.x).attr('y', mid.y - 4);
    });
    nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  simulation.force('link').links(links);
  simulation.alpha(0.8).restart();

  svg.on('click', () => clearSelection());
  applyFilters();
}

// ═══════════════════════════════════════════════════════════════════════════════
// FILTERING & SELECTION
// ═══════════════════════════════════════════════════════════════════════════════
function applyFilters() {
  const allNodes  = gRoot.selectAll('.node');

  if (!activeFilter && !selectedNode) {
    allNodes.classed('faded', false);
    gRoot.selectAll('path.link').classed('faded', false);
    gRoot.selectAll('.link-label').classed('faded', false).classed('highlighted', false);
    return;
  }

  if (activeFilter && !selectedNode) {
    allNodes.classed('faded', d => d.type !== activeFilter);
    gRoot.selectAll('path.link').classed('faded', d => {
      if (!d) return false;
      const st = typeof d.source === 'object' ? d.source.type : '';
      const tt = typeof d.target === 'object' ? d.target.type : '';
      return st !== activeFilter && tt !== activeFilter;
    });
    return;
  }

  if (selectedNode) {
    const connectedIds = new Set([selectedNode.id]);
    gRoot.selectAll('path.link').each(d => {
      if (!d) return;
      const sid = typeof d.source === 'object' ? d.source.id : d.source;
      const tid = typeof d.target === 'object' ? d.target.id : d.target;
      if (sid === selectedNode.id || tid === selectedNode.id) { connectedIds.add(sid); connectedIds.add(tid); }
    });
    allNodes.classed('faded', d => !connectedIds.has(d.id));
    gRoot.selectAll('path.link').classed('faded', d => {
      if (!d) return false;
      const sid = typeof d.source === 'object' ? d.source.id : d.source;
      const tid = typeof d.target === 'object' ? d.target.id : d.target;
      return sid !== selectedNode.id && tid !== selectedNode.id;
    });
    gRoot.selectAll('.link-label')
      .classed('highlighted', d => {
        if (!d) return false;
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return sid === selectedNode.id || tid === selectedNode.id;
      })
      .classed('faded', d => {
        if (!d) return false;
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return sid !== selectedNode.id && tid !== selectedNode.id;
      });
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// INSPECTOR
// ═══════════════════════════════════════════════════════════════════════════════
function selectNode(node, links) {
  selectedNode = node;
  applyFilters();

  const nt = getNodeType(node.type);
  const outgoing = links.filter(l => (typeof l.source === 'object' ? l.source.id : l.source) === node.id);
  const incoming = links.filter(l => (typeof l.target === 'object' ? l.target.id : l.target) === node.id);

  function relHTML(arr, dir) {
    if (!arr.length) return '';
    return `<div class="rel-group-title">${dir}</div>` + arr.map(l => {
      const other     = dir === 'outgoing' ? l.target : l.source;
      const otherId   = typeof other === 'object' ? other.id : other;
      const otherNode = graphNodes.find(n => n.id === otherId);
      return `<div class="rel-item" onclick="selectNodeById(${otherId})">
        ${l.label} → <span class="rel-target">${otherNode ? otherNode.name : '?'}</span>
        ${l.note ? `<div class="rel-note">${l.note}</div>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('infoContent').innerHTML = `
    <div class="info-name">${node.name}</div>
    <span class="type-badge" style="background:${nt.color}">${nt.label}</span>
    ${relHTML(outgoing, 'outgoing')}
    ${relHTML(incoming, 'incoming')}
    ${(!outgoing.length && !incoming.length) ? '<p class="empty-msg" style="margin-top:6px">No connections.</p>' : ''}
  `;
}

window.selectNodeById = function(id) {
  const node = graphNodes.find(n => n.id === id);
  if (!node) return;
  const nodeMap = new Map(graphNodes.map(n => [n.id, n]));
  const links = graphLinks.map(l => ({
    ...l,
    source: typeof l.source === 'object' ? l.source : nodeMap.get(l.source),
    target: typeof l.target === 'object' ? l.target : nodeMap.get(l.target),
  }));
  selectNode(node, links);
  if (node.x != null && node.y != null) {
    const t = d3.zoomTransform(svg.node());
    svg.transition().duration(400).call(zoom.transform,
      d3.zoomIdentity.translate(width/2 - node.x * t.k, height/2 - node.y * t.k).scale(t.k)
    );
  }
};

function clearSelection() {
  selectedNode = null;
  applyFilters();
  document.getElementById('infoContent').innerHTML =
    '<p class="empty-msg">Click any node to inspect its connections.</p>';
}

// ═══════════════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { clearSelection(); return; }
  gRoot.selectAll('.node').classed('faded', d => !d.name.toLowerCase().includes(q));
  gRoot.selectAll('path.link').classed('faded', true);
  gRoot.selectAll('.link-label').classed('faded', true);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const q = this.value.toLowerCase().trim();
  const match = graphNodes.find(n => n.name.toLowerCase().includes(q));
  if (match) { this.value = ''; selectNodeById(match.id); }
});

// ═══════════════════════════════════════════════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════════════════════════════════════════════
function buildLegend() {
  const types = [...new Set(graphNodes.map(n => n.type))].sort();
  const container = document.getElementById('legend');
  container.innerHTML = '';

  types.forEach(type => {
    const nt = getNodeType(type);
    const item = document.createElement('div');
    item.className = 'legend-item';

    const sw = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    sw.setAttribute('width', '14'); sw.setAttribute('height', '14');
    sw.classList.add('legend-swatch');
    const path = shapePath(nt.shape, 6);
    if (path) {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('d', path); p.setAttribute('transform', 'translate(7,7)');
      p.setAttribute('fill', nt.color); sw.appendChild(p);
    } else {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx','7'); c.setAttribute('cy','7'); c.setAttribute('r','6');
      c.setAttribute('fill', nt.color); sw.appendChild(c);
    }
    item.appendChild(sw);
    item.appendChild(document.createTextNode(nt.label));

    item.addEventListener('click', () => {
      activeFilter = activeFilter === type ? null : type;
      document.querySelectorAll('.legend-item').forEach((el, i) => {
        el.classList.toggle('dimmed', activeFilter !== null && types[i] !== activeFilter);
      });
      selectedNode = null;
      applyFilters();
    });

    container.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════════════════════
async function loadData() {
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('statusText').textContent = 'loading…';
  selectedNode = null; activeFilter = null;

  try {
    const res = await fetch(CSV_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${CSV_URL}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('CSV has no valid rows — check column headers and format.');

    const built = buildGraph(rows);
    graphNodes = built.nodes;
    graphLinks = built.links;

    renderGraph();
    buildLegend();

    document.getElementById('statusText').textContent =
      `${graphNodes.length} nodes · ${graphLinks.length} edges`;
    document.getElementById('loadingOverlay').classList.add('hidden');

  } catch(err) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    const el = document.getElementById('errorMsg');
    el.innerHTML = `
      <div>Could not load data</div>
      <code>${err.message}</code>
      <div style="font-size:0.58rem;color:var(--muted);margin-top:8px;line-height:1.7">
        Make sure <code>relationships.csv</code> is in the same directory as <code>index.html</code>.<br>
        If running locally, use a server: <code>python3 -m http.server</code>
      </div>`;
    el.classList.add('show');
    document.getElementById('statusText').textContent = 'error';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ZOOM & RESIZE
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('zoomIn').onclick    = () => svg.transition().call(zoom.scaleBy, 1.4);
document.getElementById('zoomOut').onclick   = () => svg.transition().call(zoom.scaleBy, 0.7);
document.getElementById('zoomReset').onclick = () => {
  getSize();
  svg.transition().call(zoom.transform,
    d3.zoomIdentity.translate(width/2, height/2).scale(0.9).translate(-width/2, -height/2));
};

window.addEventListener('resize', () => {
  getSize();
  if (simulation) simulation.force('center', d3.forceCenter(width/2, height/2)).alpha(0.1).restart();
});

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
